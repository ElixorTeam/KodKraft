services:
  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      args:
        PUBLIC_API_URL: ${PUBLIC_API_URL}
        FRONTEND_URL: ${FRONTEND_URL}
    env_file:
      - .env
    ports:
      - "3000:80"
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    env_file:
      - .env
    ports:
      - "3010:3000"
